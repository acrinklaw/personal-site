<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <!-- DNA double helix -->
  <!-- Left strand -->
  <path d="M8 2 C8 6, 24 10, 24 16 C24 22, 8 26, 8 30" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right strand -->
  <path d="M24 2 C24 6, 8 10, 8 16 C8 22, 24 26, 24 30" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Base pairs (horizontal rungs) -->
  <line x1="10.5" y1="6" x2="21.5" y2="6" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="8.5" y1="10" x2="23.5" y2="10" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="10" y1="16" x2="22" y2="16" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="8.5" y1="22" x2="23.5" y2="22" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="10.5" y1="26" x2="21.5" y2="26" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
